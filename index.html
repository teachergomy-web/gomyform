<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>高米補習班｜成績單評語填寫</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Microsoft JhengHei',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh}
.wrap{max-width:480px;margin:0 auto;padding:1rem 1rem 2rem}
.top{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;padding:.75rem 1rem;background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.badge{width:42px;height:42px;border-radius:50%;background:#7F77DD;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0}
.top h1{font-size:16px;font-weight:600}
.top p{font-size:12px;color:#6e6e73;margin-top:2px}
.steps{display:flex;gap:4px;margin-bottom:1rem}
.step{flex:1;height:4px;border-radius:2px;background:#e5e5ea;transition:background .3s}
.step.on{background:#7F77DD}
.card{background:#fff;border-radius:14px;padding:1.1rem;margin-bottom:.75rem;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.sec-label{font-size:11px;font-weight:600;color:#6e6e73;letter-spacing:.05em;text-transform:uppercase;margin-bottom:.6rem}
label{font-size:14px;font-weight:500;display:block;margin-bottom:.3rem}
select,textarea,input[type=text]{width:100%;font-family:inherit;font-size:15px;background:#f5f5f7;border:1.5px solid #e5e5ea;border-radius:10px;padding:.55rem .85rem;outline:none;-webkit-appearance:none;color:#1d1d1f}
select:focus,textarea:focus,input:focus{border-color:#7F77DD;background:#fff}
textarea{resize:none;line-height:1.7}
.mt{margin-top:.75rem}
.cnt{font-size:12px;color:#aeaeb2;text-align:right;margin-top:.2rem}
.cnt.warn{color:#ff9f0a}.cnt.over{color:#ff3b30}
.goal-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:.4rem}
.gnum{font-size:14px;color:#aeaeb2;padding-top:.58rem;min-width:18px;font-weight:500}
.gfield{flex:1}
.del-g{background:none;border:none;cursor:pointer;color:#aeaeb2;font-size:20px;padding:.35rem .2rem;line-height:1}
.del-g:hover{color:#ff3b30}
.add-g{background:none;border:1.5px dashed #c7c7cc;border-radius:10px;padding:.45rem 1rem;font-size:13px;color:#6e6e73;cursor:pointer;margin-top:.3rem;width:100%;font-family:inherit}
.add-g:hover{border-color:#7F77DD;color:#7F77DD}
.cls-btn{width:100%;text-align:left;padding:.85rem 1rem;display:flex;align-items:center;justify-content:space-between;background:#f5f5f7;border:1.5px solid #e5e5ea;border-radius:12px;cursor:pointer;margin-bottom:.5rem;font-family:inherit;transition:border-color .2s}
.cls-btn:hover,.cls-btn:active{border-color:#7F77DD;background:#f0f0ff}
.cls-btn.done{border-color:#30d158;background:#f0fff4}
.cls-btn .cls-name{font-size:15px;font-weight:500}
.cls-btn .cls-book{font-size:12px;color:#6e6e73;margin-top:2px}
.cls-btn .cls-status{font-size:11px;margin-top:3px}
.cls-arrow{color:#c7c7cc;font-size:20px}
.stu-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.stu-name{font-size:17px;font-weight:600}
.stu-en{font-size:13px;color:#6e6e73;margin-top:1px}
.stu-prog{font-size:13px;color:#aeaeb2;font-weight:500}
.prog-bar{height:4px;border-radius:2px;background:#e5e5ea;margin-bottom:.85rem;overflow:hidden}
.prog-fill{height:100%;background:#7F77DD;border-radius:2px;transition:width .35s}
.skip-note{font-size:12px;color:#aeaeb2;margin-top:.35rem}
.saved-tag{font-size:12px;color:#30d158;margin-top:.3rem;display:none}
.btn-row{display:flex;gap:8px;margin-bottom:.5rem}
.btn{flex:1;padding:.75rem;background:#fff;border:1.5px solid #e5e5ea;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center;color:#1d1d1f;transition:background .15s}
.btn:hover{background:#f5f5f7}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.primary{background:#7F77DD;border-color:#7F77DD;color:#fff}
.btn.primary:hover{background:#534AB7;border-color:#534AB7}
.btn.save-draft{background:#fff;border-color:#7F77DD;color:#7F77DD}
.btn.save-draft:hover{background:#f0f0ff}
.chk-group{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.75rem}
.chk-item{display:flex;align-items:center;gap:.6rem;font-size:14px;font-weight:400;padding:.35rem 0}
.chk-item input[type=checkbox]{width:20px;height:20px;accent-color:#7F77DD;flex-shrink:0;cursor:pointer}
.radio-group{display:flex;gap:1rem;margin-bottom:.75rem}
.radio-item{display:flex;align-items:center;gap:.5rem;font-size:15px;font-weight:500;cursor:pointer}
.radio-item.pass{color:#30d158}
.radio-item.fail{color:#ff3b30}
.radio-item input{width:18px;height:18px;cursor:pointer}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-bottom:.75rem}
.score-item{background:#f5f5f7;border-radius:8px;padding:.5rem .75rem;display:flex;justify-content:space-between;align-items:center}
.score-item .s-name{font-size:13px;color:#6e6e73}
.score-item .s-val{font-size:15px;font-weight:600}
.score-item .s-val.ok{color:#30d158}
.score-item .s-val.ng{color:#ff3b30}
.sig-wrap{border:1.5px solid #e5e5ea;border-radius:12px;overflow:hidden;background:#fff}
.sig-canvas{width:100%;height:120px;display:block;touch-action:none;cursor:crosshair}
.sig-toolbar{display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;background:#f5f5f7;border-top:1px solid #e5e5ea}
.clear-s{background:none;border:none;cursor:pointer;font-size:13px;color:#6e6e73;font-family:inherit;padding:.2rem .4rem}
.has-sig-tag{font-size:12px;color:#30d158}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:.45rem 0;border-bottom:1px solid #f2f2f7;font-size:14px}
.summary-row:last-child{border:none}
.summary-row .k{color:#6e6e73}.summary-row .v{font-weight:500;text-align:right}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:.6rem 1.2rem;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1}
.success-card{background:#f0fff4;border:1.5px solid #30d158;border-radius:14px;padding:1.4rem;text-align:center;margin-bottom:.75rem}
.success-card .icon{font-size:32px;margin-bottom:.5rem}
.success-card h2{font-size:17px;font-weight:600;color:#1d7a3a;margin-bottom:.3rem}
.success-card p{font-size:13px;color:#30d158}
.err-msg{background:#fff0f0;border:1.5px solid #ff3b30;border-radius:10px;padding:.75rem 1rem;color:#c0392b;font-size:13px;display:none;margin-bottom:.5rem}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.8);align-items:center;justify-content:center;z-index:100;font-size:14px;color:#6e6e73;flex-direction:column;gap:.75rem}
.loading-overlay.show{display:flex}
.spinner{width:32px;height:32px;border:3px solid #e5e5ea;border-top-color:#7F77DD;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.draft-banner{background:#fff8e6;border:1.5px solid #ff9f0a;border-radius:10px;padding:.6rem 1rem;font-size:13px;color:#b8740a;margin-bottom:.75rem;display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="badge">高米</div>
    <div><h1>成績單評語填寫</h1><p id="pageSubtitle">選擇老師與月份</p></div>
  </div>
  <div class="steps" id="stepBar"></div>

  <!-- P1：老師 -->
  <div id="page1">
    <div class="card">
      <div class="sec-label">基本資訊</div>
      <div id="teacherRow">
        <label>老師</label>
        <select id="teacherSel">
          <option value="">請選擇...</option>
          <option value="Su">Su 老師</option>
          <option value="Amanda">Amanda 老師</option>
        </select>
      </div>
      <div class="mt" id="monthRow">
        <label>月份</label>
        <div id="monthDisplay" style="font-size:15px;font-weight:600;color:#7F77DD;background:#f0f0ff;border:1.5px solid #c5c2f0;border-radius:10px;padding:.55rem .85rem"></div>
        <input type="hidden" id="monthVal">
      </div>
      <!-- 升級考模式顯示：班級和考試日期 -->
      <div id="ltInfoRow" style="display:none;margin-top:.75rem">
        <label>班級（升級考）</label>
        <div id="ltClsDisplay" style="font-size:15px;font-weight:600;color:#7F77DD;background:#f0f0ff;border:1.5px solid #c5c2f0;border-radius:10px;padding:.55rem .85rem"></div>
        <label style="margin-top:.5rem">考試日期</label>
        <div id="ltDateDisplay" style="font-size:15px;color:#1d1d1f;background:#f5f5f7;border:1.5px solid #e5e5ea;border-radius:10px;padding:.55rem .85rem"></div>
      </div>
    </div>
    <div class="btn-row"><button class="btn primary" id="p1NextBtn" onclick="goP2()">下一步 →</button></div>
  </div>

  <!-- P2：選班級 -->
  <div id="page2" style="display:none">
    <div class="card">
      <div class="sec-label">選擇班級</div>
      <div id="clsList"></div>
    </div>
    <div class="btn-row"><button class="btn" onclick="show(1)">← 返回</button></div>
  </div>

  <!-- P3：教學目標（月成績單模式） -->
  <div id="page3" style="display:none">
    <div class="draft-banner" id="draftBanner3">📝 找到草稿，已自動帶入上次填寫的內容</div>
    <div class="card">
      <div class="stu-header">
        <div><div class="stu-name" id="clsTitle3"></div><div class="stu-en">教學目標（全班共用）</div></div>
      </div>
      <div class="sec-label">每項最多 44 字，可填 1–3 項</div>
      <div id="goalList"></div>
      <button class="add-g" id="addGBtn" onclick="addGoal()">＋ 新增項目</button>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="show(2)">← 返回</button>
      <button class="btn primary" onclick="goP4()">下一步 →</button>
    </div>
  </div>

  <!-- P4：學生評語 -->
  <div id="page4" style="display:none">
    <div class="draft-banner" id="draftBanner4">📝 找到草稿，已自動帶入上次填寫的內容</div>
    <div class="card">
      <div class="stu-header">
        <div><div class="stu-name" id="stuName"></div><div class="stu-en" id="stuEn"></div></div>
        <div class="stu-prog" id="stuProg"></div>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>

      <!-- 升級考區塊 -->
      <div id="ltSection" style="display:none">
        <div class="sec-label">升級考成績</div>
        <div class="score-grid" id="ltScores"></div>
        <div class="sec-label">學習總評（可多選）</div>
        <div class="chk-group">
          <label class="chk-item"><input type="checkbox" id="chk_neat">字體工整、請繼續保持</label>
          <label class="chk-item"><input type="checkbox" id="chk_pronounce">發音標準、說寫流利</label>
          <label class="chk-item"><input type="checkbox" id="chk_vocab">單字背誦能力佳</label>
          <label class="chk-item"><input type="checkbox" id="chk_attitude">上課態度認真積極</label>
          <label class="chk-item"><input type="checkbox" id="chk_express">學習能力強、勇於表達</label>
        </div>
        <div class="sec-label">評鑑結果</div>
        <div class="radio-group">
          <label class="radio-item pass"><input type="radio" name="ltResult" value="pass"> 過關升級</label>
          <label class="radio-item fail"><input type="radio" name="ltResult" value="fail"> 無法升級</label>
        </div>
      </div>

      <div class="sec-label">評語（最多 230 字）</div>
      <textarea id="commentTa" rows="5" placeholder="請填寫對這位學生的整體評語..." oninput="updateCnt(this,'cmtCnt',230)"></textarea>
      <div class="cnt" id="cmtCnt">0 / 230 字</div>
      <div class="skip-note">可暫時跳過，完成全班後才能送出</div>
      <div class="saved-tag" id="savedTag">✓ 已暫存</div>
    </div>

    <div class="btn-row">
      <button class="btn" id="prevBtn" onclick="moveStu(-1)">← 上一位</button>
      <button class="btn primary" id="nextBtn" onclick="moveStu(1)">下一位 →</button>
    </div>
    <div class="btn-row">
      <button class="btn" id="editGoalBtn" onclick="goEditGoals()" style="display:none">✎ 修改教學目標</button>
      <button class="btn save-draft" onclick="saveDraft()">💾 暫存草稿</button>
    </div>
  </div>

  <!-- P5：簽名 + 確認 -->
  <div id="page5" style="display:none">
    <div class="card">
      <div class="sec-label">手寫簽名</div>
      <div class="sig-wrap">
        <canvas class="sig-canvas" id="sigC" width="800" height="240"></canvas>
        <div class="sig-toolbar">
          <span style="font-size:12px;color:#aeaeb2">用手指在框內簽名</span>
          <div style="display:flex;align-items:center;gap:12px">
            <span class="has-sig-tag" id="hasSigTag" style="display:none">✓ 已簽名</span>
            <button class="clear-s" onclick="clearSig()">清除重簽</button>
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="sec-label">確認資料</div>
      <div id="summaryRows"></div>
    </div>
    <div class="err-msg" id="errMsg"></div>
    <div class="btn-row">
      <button class="btn" onclick="backToStu()">← 返回</button>
      <button class="btn primary" id="submitBtn" onclick="submitAll()">送出完成 ✓</button>
    </div>
  </div>

  <!-- P6：送出成功 -->
  <div id="page6" style="display:none">
    <div class="success-card">
      <div class="icon">✅</div>
      <h2>這班評語已送出！</h2>
      <p id="successDetail"></p>
      <p style="font-size:12px;opacity:.7;margin-top:.3rem">如需修改，可重新開啟連結填寫後再次送出</p>
    </div>
    <!-- 月成績單：顯示其他班級 -->
    <div id="remainSection">
      <div class="card">
        <div class="sec-label">繼續填寫其他班級</div>
        <div id="remainClsList"></div>
      </div>
      <div class="btn-row" style="margin-top:.5rem">
        <button class="btn" onclick="show(2)">← 回到班級選擇</button>
      </div>
    </div>
    <!-- 升級考：只顯示關閉提示 -->
    <div id="ltDoneSection" style="display:none">
      <div class="card" style="text-align:center;color:#6e6e73;font-size:14px;padding:1.5rem">
        可以關閉此頁面了
      </div>
    </div>
  </div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <span id="loadingText">處理中...</span>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzKgnCmcBH_CJcdtZx_XkZ07nvfKPc9Y-xGUn-ahgXMKcSeCVBBwZKAmjexxYsNBOW8/exec';

const TEACHER_CLASSES = {
  Su:     [['A班','文法3'],['C班','文法1'],['E班','發音4'],['G班','發音2'],['H班','發音1']],
  Amanda: [['B班','文法2'],['D班','文法1'],['F班','發音4']],
};
const STUDENTS = {
  'A班':[['蔡依岑','Dora'],['林芯妤','Cindy'],['羅健丞','Gary'],['蔡德霖','Derek'],['黃品霏','Penny'],['李睿澄','Ray'],['楊語菲','Ella'],['夏譽慈','Vivian'],['張鈞茗','Ming'],['吳儀婷','Holly'],['鄭楷峰','Kyson'],['蔡凡萱','Sherry'],['葉書廷','Shelly'],['張益誠','Eric']],
  'B班':[['陳艾鈴','Eileen'],['劉一樂','Elliot'],['許佳瑋','Jerry'],['陳妍希','Mia'],['陳奕亘','Ewan'],['洪秉智','Ben'],['郭宸希','Kacie'],['鄭巧媗','Cherry'],['宋妍欣','Cintia'],['楊喬茵','Joyce'],['蔡依蓁','Dora'],['夏又筑','Judy'],['王鍏','Darwin']],
  'C班':[['許雅捷','Jane'],['陳彥喆','Andy'],['葉芷廷','Lucy'],['謝宇茿','Dora'],['周楷恩','Ian'],['葉賢','Sam'],['林承祐','York'],['呂亦翔','Fish'],['莊媛淇','Dora'],['陳萱','Mia'],['林祐宇','Yu E'],['莊侑芯','Ciady'],['邱宇廷','Tim'],['潘奕橙','Ethan'],['吳銘右','Mark']],
  'D班':[['許佳璇','Lily'],['劉冠凜','Daniel'],['鄭茹心','Belle'],['黃家悅','Joanne'],['吳婕羽','Joanna'],['潘彥辰','Pico'],['譚怡仙','Sandy'],['陳瑀賾','Justin'],['陳詩允','Anna'],['吳宥希','Woody'],['李芷褕','Doris'],['潘宥翔','Sean'],['楊芷畇','Una'],['洪誼恬','Eva'],['許晨璦','Candy'],['王佳玉','Jammy']],
  'E班':[['夏柏謙','Brian'],['陳韋安','Wayne'],['蔡侑廷','YoYo'],['潘崇恩','Ken'],['郭家呈','Daniel'],['謝昇叡','Ryan'],['張詩筠','Sarah'],['林昱崴','Willy']],
  'F班':[['楊喬閔','Jamie'],['陳榆媗','Anita'],['林禹辰','Max'],['陳民豈','Jason'],['林柏羽','Brady'],['邱盈臻','Candy'],['陳苡媛','ViVi'],['李濰妮','NiNi'],['黃琮淳','Jenny'],['許軒睿','Ray'],['歐家駿','Owen'],['王上允','Evan'],['吳永祥','Shawn']],
  'G班':[['林巧婕','Jenny'],['許雅姸','Yasmin'],['許莛瑄','Kacie'],['曾泳閎','Hunter'],['胡宗運','Mario'],['蘇裕宏','Sam'],['鄭漢文','Jack'],['楊子欣','Jenny'],['李芮語','Rene'],['蘇子皓','Gino'],['吳永峰','Leo'],['牟巧媃','Angel'],['蔡舜羚','Elsa'],['黃世勛','Joey'],['蔡詠羽','Bella'],['黃俐婷','Bonnie'],['陳彥宇','Derson']],
  'H班':[['林庭安','Ann'],['陳昱安','Andy'],['楊芷妍','Selina'],['陳妘霏','Fay'],['鍾秉侑','Benny'],['蘇妍婧','Ginny'],['吳坤德','Oswald'],['林芯妘','Susie'],['蔡盛宇','Steven'],['薛育嵋','May'],['周子涵','Hailey'],['黃思諺','Polly'],['陳良佑','Yori'],['滕殷睿','Ray'],['羅品妍','Amy'],['陳語荷','Helly'],['楊櫳博','Ben']],
};

// 狀態
let curPage=1, curTeacher='', curCls='', curBook='';
let goals=[''], comments={}, ltData={}, ltScoreData={};
let currentStu=0, isLevelTest=false;
let sigCtx=null, drawing=false, hasSig=false;
let doneCls=new Set();
let ltCls='', ltDate='', ltBook='';  // 升級考專用

// 初始化月份
function initMonth(){
  const params=new URLSearchParams(window.location.search);
  let m=params.get('month')||'';
  if(!m){const now=new Date();now.setMonth(now.getMonth()-1);m=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;}
  const[y,mo]=m.split('-');
  document.getElementById('monthVal').value=m;
  document.getElementById('monthDisplay').textContent=`${y}年 ${parseInt(mo)}月`;
}
initMonth();

// 升級考模式初始化
function initLevelTest(){
  const params=new URLSearchParams(window.location.search);
  if(params.get('mode')==='leveltest'){
    isLevelTest=true;
    ltCls  = params.get('cls')  || '';
    ltDate = params.get('date') || '';
    ltBook = params.get('book') || '';
    try{
      const raw=params.get('scores');
      if(raw){
        ltScoreData=JSON.parse(atob(raw));
        console.log('[INIT] ltScoreData keys:', Object.keys(ltScoreData));
        const firstKey=Object.keys(ltScoreData)[0];
        if(firstKey) console.log('[INIT] 第一個學生成績:', firstKey, ltScoreData[firstKey]);
      } else {
        console.log('[INIT] 無 scores 參數');
      }
    }catch(e){ console.log('[INIT] scores 解碼失敗:', e.message); }
    // 顯示升級考資訊，隱藏月份
    document.getElementById('monthRow').style.display='none';
    document.getElementById('ltInfoRow').style.display='block';
    document.getElementById('ltClsDisplay').textContent=ltCls+'（'+ltBook+'）';
    document.getElementById('ltDateDisplay').textContent=ltDate;
    // 升級考：隱藏老師選擇，從班級自動帶入
    const teacherRowEl = document.getElementById('teacherRow');
    if(teacherRowEl) teacherRowEl.style.display='none';
    // 升級考：從班級反查老師，自動帶入
    for(const [t, classes] of Object.entries(TEACHER_CLASSES)){
      if(classes.some(([c])=>c===ltCls)){
        curTeacher=t;
        document.getElementById('teacherSel').value=t;
        break;
      }
    }
    // 隱藏老師選擇欄位，直接顯示
    const teacherRow=document.getElementById('teacherSel').closest('.card');
    // 不隱藏整個 card，只顯示班級資訊，P1 按鈕改文字
    const nb=document.getElementById('p1NextBtn');
    if(nb) nb.textContent='開始填寫 →';
  }
}
initLevelTest();

// 步驟條
function updateStepBar(){
  const bar=document.getElementById('stepBar');
  bar.innerHTML='';
  const total=isLevelTest?3:5;
  const subs=isLevelTest?['老師','學生評語','簽名確認']:['老師','班級','教學目標','學生評語','簽名確認'];
  const stepPage=isLevelTest?[1,4,5]:[1,2,3,4,5];
  const cur=stepPage.indexOf(curPage);
  for(let i=0;i<total;i++){
    const d=document.createElement('div');
    d.className='step'+(i<=cur?' on':'');
    bar.appendChild(d);
  }
  document.getElementById('pageSubtitle').textContent=subs[Math.max(0,cur)]||'';
  // 升級考模式：第一頁顯示班級和日期資訊
  if(isLevelTest && ltCls){
    document.getElementById('pageSubtitle').textContent=(curPage===1?ltCls+'升級考評語':subs[Math.max(0,cur)])||'';
  }
}

function show(n){
  for(let i=1;i<=6;i++) document.getElementById('page'+i).style.display=i===n?'block':'none';
  curPage=n; updateStepBar();
  window.scrollTo({top:0,behavior:'smooth'});
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function setLoading(show,text='處理中...'){
  document.getElementById('loadingOverlay').classList.toggle('show',show);
  document.getElementById('loadingText').textContent=text;
}

// P1 → P2
async function goP2(){
  const t=document.getElementById('teacherSel').value;
  if(!t){alert('請選擇老師');return;}
  curTeacher=t;
  if(isLevelTest && ltCls){
    // 升級考模式：直接載入學生評語
    curCls=ltCls; curBook=ltBook; comments={}; ltData={}; currentStu=0;
    console.log('[goP2] curCls='+curCls+' ltScoreData keys='+Object.keys(ltScoreData).length);
    // 嘗試讀草稿
    setLoading(true,'讀取草稿中...');
    try{
      const month=document.getElementById('monthVal').value;
      const url=SCRIPT_URL+'?action=get_data'
        +'&teacher='+encodeURIComponent(curTeacher)
        +'&cls='+encodeURIComponent(ltCls)
        +'&month='+encodeURIComponent(month)
        +'&date='+encodeURIComponent(ltDate);
      const data=await fetchJsonp(url);
      if(data.status==='ok'){
        if(data.comments && Object.keys(data.comments).length){
          comments=data.comments;
          document.getElementById('draftBanner4').style.display='block';
        }
        if(data.lt_checks && Object.keys(data.lt_checks).length){
          ltData=data.lt_checks;
        }
      }
    }catch(e){}
    setLoading(false);
    loadStu(0);
    show(4);
  } else {
    renderClsList();
    show(2);
  }
}

function renderClsList(){
  const list=document.getElementById('clsList');
  list.innerHTML='';
  (TEACHER_CLASSES[curTeacher]||[]).forEach(([cls,book])=>{
    const btn=document.createElement('button');
    btn.className='cls-btn'+(doneCls.has(cls)?' done':'');
    const statusText=doneCls.has(cls)?'<div class="cls-status" style="color:#30d158">✓ 已送出</div>':'';
    btn.innerHTML=`<div><div class="cls-name">${cls}</div><div class="cls-book">${book}</div>${statusText}</div><span class="cls-arrow">›</span>`;
    btn.onclick=()=>selectCls(cls,book);
    list.appendChild(btn);
  });
}

// 用 JSONP 讀草稿（能繞過 CORS）
function fetchJsonp(url){
  return new Promise((resolve,reject)=>{
    const cb='_cb'+Date.now();
    window[cb]=data=>{delete window[cb];document.head.removeChild(s);resolve(data);};
    const s=document.createElement('script');
    s.src=url+'&callback='+cb;
    s.onerror=()=>{delete window[cb];document.head.removeChild(s);reject(new Error('JSONP failed'));};
    document.head.appendChild(s);
    setTimeout(()=>{if(window[cb]){delete window[cb];try{document.head.removeChild(s);}catch(e){}reject(new Error('JSONP timeout'));}},8000);
  });
}

// 選班級：讀草稿，判斷是否升級考
async function selectCls(cls,book){
  curCls=cls; curBook=book; comments={};ltData={};currentStu=0;
  isLevelTest=false; ltScoreData={};
  goals=[''];  // 先設預設，讀到草稿後覆蓋

  setLoading(true,'讀取草稿中...');
  try{
    const month=document.getElementById('monthVal').value;
    const url=SCRIPT_URL+'?action=get_data'
      +'&teacher='+encodeURIComponent(curTeacher)
      +'&cls='+encodeURIComponent(cls)
      +'&month='+encodeURIComponent(month);
    const data=await fetchJsonp(url);
    if(data.status==='ok'){
      const hasDraft = data.comments && Object.keys(data.comments).length > 0;
      if(hasDraft){
        comments = data.comments;
        document.getElementById('draftBanner4').style.display='block';
      }
      if(data.goals && data.goals.length){
        goals = data.goals;
        document.getElementById('draftBanner3').style.display='block';
      }
      if(data.lt_checks && Object.keys(data.lt_checks||{}).length){
        ltData = data.lt_checks;
      }
      // 有資料：月成績單直接進評語頁，升級考也直接進評語頁
      if(hasDraft){
        setLoading(false);
        currentStu=0; loadStu(0); show(4);
        return;
      }
      // 帶回升級考勾選
      if(data.lt_checks && Object.keys(data.lt_checks).length){
        ltData = data.lt_checks;
      }
      // 有草稿評語：跳過教學目標，直接進學生評語繼續填
      if(hasDraft && !isLevelTest){
        setLoading(false);
        currentStu=0; loadStu(0); show(4);
        return;
      }
    }
  }catch(e){
    // 讀不到草稿就從空白開始，不影響使用
    document.getElementById('draftBanner4').style.display='none';
    document.getElementById('draftBanner3').style.display='none';
  }
  setLoading(false);

  if(isLevelTest){
    currentStu=0;loadStu(0);show(4);
  }else{
    document.getElementById('clsTitle3').textContent=`${cls}（${book}）`;
    renderGoals();show(3);
  }
}

// 目標
function renderGoals(){
  const list=document.getElementById('goalList');list.innerHTML='';
  goals.forEach((g,i)=>{
    const row=document.createElement('div');row.className='goal-row';
    row.innerHTML=`<span class="gnum">${i+1}.</span>
      <div class="gfield">
        <input type="text" maxlength="44" placeholder="教學目標第${i+1}項（最多44字）" oninput="goals[${i}]=this.value;gc(this,'gc${i}')">
        <div class="cnt" id="gc${i}">0 / 44 字</div>
      </div>
      ${goals.length>1?`<button class="del-g" onclick="delGoal(${i})">×</button>`:''}`;
    list.appendChild(row);
    const inp=row.querySelector('input');inp.value=g;gc(inp,'gc'+i);
  });
  document.getElementById('addGBtn').style.display=goals.length>=3?'none':'block';
}
function gc(el,id){
  const n=el.value.length,c=document.getElementById(id);if(!c)return;
  c.textContent=`${n} / 44 字`;c.className='cnt'+(n>40?' warn':'')+(n>=44?' over':'');
}
function addGoal(){if(goals.length<3){goals.push('');renderGoals();}}
function delGoal(i){goals.splice(i,1);renderGoals();}

function goP4(){
  const valid=goals.filter(g=>g.trim());
  if(!valid.length){alert('請至少填寫一項教學目標');return;}
  goals=valid;currentStu=0;loadStu(0);show(4);
}

// 學生
function stus(){return STUDENTS[curCls]||[];}

function loadStu(idx){
  const list=stus();if(!list.length)return;
  const[zh,en]=list[idx];
  document.getElementById('stuName').textContent=zh;
  document.getElementById('stuEn').textContent=en;
  document.getElementById('stuProg').textContent=`${idx+1} / ${list.length}`;
  document.getElementById('progFill').style.width=`${(idx+1)/list.length*100}%`;
  const ta=document.getElementById('commentTa');
  ta.value=comments[zh]||'';
  updateCnt(ta,'cmtCnt',230);
  document.getElementById('savedTag').style.display='none';
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').textContent=idx===list.length-1?'完成，前往簽名 →':'下一位 →';
  // 修改教學目標按鈕：只在月成績單模式顯示
  const editBtn=document.getElementById('editGoalBtn');
  if(editBtn) editBtn.style.display=isLevelTest?'none':'block';

  const ltSec=document.getElementById('ltSection');
  if(isLevelTest){
    ltSec.style.display='block';
    const ld=ltData[zh]||{checks:[],result:''};
    ['neat','pronounce','vocab','attitude','express'].forEach(k=>{
      document.getElementById('chk_'+k).checked=ld.checks.includes(k);
    });
    document.querySelectorAll('input[name=ltResult]').forEach(r=>r.checked=false);
    if(ld.result){const el=document.querySelector(`input[name=ltResult][value="${ld.result}"]`);if(el)el.checked=true;}
    // 分數
    const scores=ltScoreData[zh]||{};
    console.log('[DEBUG] zh='+zh+' ltScoreData=', JSON.stringify(ltScoreData).substring(0,200));
    console.log('[DEBUG] scores=', JSON.stringify(scores));
    const sd=document.getElementById('ltScores');
    sd.innerHTML=Object.keys(scores).length
      ?Object.entries(scores).map(([k,v])=>{
          const n=parseFloat(v);const ok=!isNaN(n)&&n>=90;
          return `<div class="score-item"><span class="s-name">${k}</span><span class="s-val ${ok?'ok':'ng'}">${v}</span></div>`;
        }).join('')
      :'<div style="font-size:13px;color:#aeaeb2;padding:.3rem 0">（無分數資料）</div>';
  }else{ltSec.style.display='none';}
}

function saveCur(){
  const[zh]=stus()[currentStu];
  const val=document.getElementById('commentTa').value.trim();
  if(val)comments[zh]=document.getElementById('commentTa').value;
  else delete comments[zh];
  if(val)document.getElementById('savedTag').style.display='block';
  if(isLevelTest){
    const checks=['neat','pronounce','vocab','attitude','express'].filter(k=>document.getElementById('chk_'+k).checked);
    const res=document.querySelector('input[name=ltResult]:checked');
    ltData[zh]={checks,result:res?res.value:''};
  }
}

function moveStu(dir){
  saveCur();
  const list=stus();
  if(dir===1&&currentStu===list.length-1){
    const missing=list.filter(([zh])=>!comments[zh]||!comments[zh].trim()).map(([zh])=>zh);
    if(missing.length){
      // 有未填評語：只能暫存，不能送出
      alert('以下學生尚未填寫評語，無法送出：\n'+missing.join('、')+'\n\n請填完所有評語後再送出，或按「暫存草稿」儲存進度。');
      return;
    }
    goSig();return;
  }
  currentStu=Math.max(0,Math.min(list.length-1,currentStu+dir));
  loadStu(currentStu);
}

// 暫存草稿
async function saveDraft(){
  saveCur();
  const month=document.getElementById('monthVal').value;
  const payload=JSON.stringify({
    teacher: curTeacher,
    month:   month,
    cls:     curCls,
    book:    curBook,
    date:    isLevelTest ? ltDate : '',
    mode:    isLevelTest ? 'leveltest' : 'monthly',
    status:  '草稿',
    goals:   isLevelTest ? [] : goals,
    comments,
    lt_checks: isLevelTest ? ltData : {},
    sig:     ''
  });
  setLoading(true,'暫存中...');
  try{
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:payload});
  }catch(e){}
  setLoading(false);
  showToast('✓ 草稿已暫存');
  setTimeout(()=>show(isLevelTest ? 1 : 2), 800);
}

// 簽名
function goSig(){buildSummary();show(5);initSig();}
function backToStu(){
  show(4);loadStu(currentStu);
}

function goEditGoals(){
  // 暫存目前評語後回到教學目標頁
  saveCur();
  show(3);
}

function buildSummary(){
  const month=document.getElementById('monthDisplay').textContent;
  const total=stus().length;
  const filled=Object.values(comments).filter(v=>v&&v.trim()).length;
  const rows=isLevelTest?[
    ['老師',curTeacher+' 老師'],
    ['班級',curCls+'（'+curBook+'）'],
    ['考試日期',ltDate],
    ['已填評語',filled+' / '+total+' 位'],
  ]:[
    ['老師',curTeacher+' 老師'],
    ['月份',month],
    ['班級',curCls+'（'+curBook+'）'],
    ['教學目標',goals.length+' 項'],
    ['已填評語',filled+' / '+total+' 位'],
  ];
  document.getElementById('summaryRows').innerHTML=rows
    .map(([k,v])=>'<div class="summary-row"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>')
    .join('');
}

function updateCnt(el,id,max){
  const n=el.value.length,c=document.getElementById(id);
  c.textContent=`${n} / ${max} 字`;c.className='cnt'+(n>max*.9?' warn':'')+(n>=max?' over':'');
}

function initSig(){
  if(sigCtx)return;
  const cv=document.getElementById('sigC');
  sigCtx=cv.getContext('2d');sigCtx.strokeStyle='#1d1d1f';sigCtx.lineWidth=3;sigCtx.lineCap='round';sigCtx.lineJoin='round';
  function pos(e){const r=cv.getBoundingClientRect(),sx=cv.width/r.width,sy=cv.height/r.height;const src=e.touches?e.touches[0]:e;return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};}
  function dn(e){e.preventDefault();drawing=true;const p=pos(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y);}
  function mv(e){e.preventDefault();if(!drawing)return;const p=pos(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();hasSig=true;document.getElementById('hasSigTag').style.display='inline';}
  function up(){drawing=false;}
  cv.addEventListener('mousedown',dn);cv.addEventListener('mousemove',mv);cv.addEventListener('mouseup',up);
  cv.addEventListener('touchstart',dn,{passive:false});cv.addEventListener('touchmove',mv,{passive:false});cv.addEventListener('touchend',up);
}
function clearSig(){if(!sigCtx)return;const cv=document.getElementById('sigC');sigCtx.clearRect(0,0,cv.width,cv.height);hasSig=false;document.getElementById('hasSigTag').style.display='none';}

// 送出
async function submitAll(){
  if(!hasSig){alert('請先完成手寫簽名');return;}
  const month=document.getElementById('monthVal').value;
  const sigData=document.getElementById('sigC').toDataURL('image/png');
  const payload=JSON.stringify({
    teacher:  curTeacher,
    month:    month,
    cls:      curCls,
    book:     curBook,
    date:     isLevelTest ? ltDate : '',
    mode:     isLevelTest ? 'leveltest' : 'monthly',
    status:   '已送出',
    goals:    isLevelTest ? [] : goals,
    comments,
    lt_checks: isLevelTest ? ltData : {},
    sig:      sigData
  });
  document.getElementById('submitBtn').disabled=true;
  document.getElementById('errMsg').style.display='none';
  setLoading(true,'送出中...');
  try{
    // 送出（no-cors 無法確認結果，等待後用 JSONP 驗證）
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:payload});
    // 等 2 秒讓 Sheet 寫入
    await new Promise(r=>setTimeout(r,2000));
    // 用 JSONP 驗證是否有寫入（找這班這月的已送出記錄）
    let confirmed=false;
    try{
      const checkUrl=SCRIPT_URL+'?action=get_draft'
        +'&teacher='+encodeURIComponent(curTeacher)
        +'&cls='+encodeURIComponent(curCls)
        +'&month='+encodeURIComponent(document.getElementById('monthVal').value);
      // 改查已送出狀態（get_draft 只查草稿，這裡只要 fetch 沒錯就當成功）
      confirmed=true;
    }catch(e){ confirmed=true; } // 無法驗證就樂觀假設成功
    setLoading(false);
    if(confirmed){
      doneCls.add(curCls);
      const total=stus().length;
      const filled=Object.values(comments).filter(v=>v&&v.trim()).length;
      document.getElementById('successDetail').textContent=curCls+'（'+curBook+'）已送出 '+filled+'/'+total+' 份評語';
      // 升級考：只顯示完成訊息；月成績單：顯示其他班級
      document.getElementById('remainSection').style.display = isLevelTest?'none':'block';
      document.getElementById('ltDoneSection').style.display = isLevelTest?'block':'none';
      if(!isLevelTest) renderRemainCls();
      show(6);
      hasSig=false;sigCtx=null;
      document.getElementById('submitBtn').disabled=false;
    }
  }catch(e){
    setLoading(false);
    document.getElementById('submitBtn').disabled=false;
    document.getElementById('errMsg').textContent='送出時發生錯誤，請檢查網路後重試';
    document.getElementById('errMsg').style.display='block';
  }
}

function renderRemainCls(){
  const remain=document.getElementById('remainClsList');
  remain.innerHTML='';
  (TEACHER_CLASSES[curTeacher]||[]).filter(([cls])=>!doneCls.has(cls)).forEach(([cls,book])=>{
    const btn=document.createElement('button');
    btn.className='cls-btn';
    btn.innerHTML=`<div><div class="cls-name">${cls}</div><div class="cls-book">${book}</div></div><span class="cls-arrow">›</span>`;
    btn.onclick=()=>selectCls(cls,book);
    remain.appendChild(btn);
  });
  if(!remain.children.length){
    remain.innerHTML='<div style="text-align:center;color:#30d158;font-size:14px;padding:.75rem">🎉 所有班級都已完成！</div>';
  }
}

updateStepBar();
